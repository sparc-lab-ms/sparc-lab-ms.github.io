baseURL = "https://sparc-lab-ms.github.io/"
theme = "hugo-apero"
languageCode = "en-GB"
title = "SPARC Lab"
author = "SPARC Lab"
copyright = ""
metaDataFormat = "yaml"
footnoteReturnLinkContents = "&#8617;"
enableEmoji = true

[pagination]
  pagerSize = 5

preserveTaxonomyNames = true
ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_cache$", "\\.knit\\.md$", "\\.utf8\\.md$"]

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
    hardwraps = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.highlight]
    style = "github"

[params]
  orgName = "Institute for Geoinformatics"
  orgLocal = "University of Münster"
  description = "Spatial and Architectural Cognition (SPARC) Lab at the Institute for Geoinformatics, University of Münster."
  favicon = "/img/favicon.ico"
  # logo deliberately unset: header shows site title as text, image logo lives in the home sidebar
  mainSections = ["blog"]
  navallcaps = true
  socialInHeader = false
  socialInFooter = true
  sharing_image = "/img/sparc-share.png"

  # SPARC custom palette defined in assets/sparc-hex.scss
  # (file name must contain "hex" for Apéro to pick up hex colours).
  theme = ""
  custom_theme = "sparc-hex"

  customtextFontFamily = "Commissioner"
  customheadingFontFamily = "Fraunces"
  textFontFamily = "sans-serif"
  headingFontFamily = "sans-serif"

  comments = ""

  [params.math]
    renderer = "katex"

  [[params.social]]
    icon      = "github"
    icon_pack = "fab"
    url       = "https://github.com/sparc-lab-ms"
  [[params.social]]
    icon      = "university"
    icon_pack = "fas"
    url       = "https://www.uni-muenster.de/Geoinformatics/"
  [[params.social]]
    icon      = "rss"
    icon_pack = "fas"
    url       = "/blog/index.xml"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.header]]
    name = "News"
    title = "News"
    url = "/"
    weight = 1
  [[menu.header]]
    name = "Team"
    title = "Team"
    url = "/team/"
    weight = 2
  [[menu.header]]
    name = "Publications"
    title = "Publications"
    url = "/publications/"
    weight = 3
  [[menu.header]]
    name = "Projects"
    title = "Projects"
    url = "/projects/"
    weight = 4
  [[menu.header]]
    name = "Teaching"
    title = "Teaching"
    url = "/teaching/"
    weight = 5
  [[menu.header]]
    name = "Theses"
    title = "Theses"
    url = "/theses/"
    weight = 6
  [[menu.header]]
    name = "Join us"
    title = "Join us"
    url = "/join-us/"
    weight = 7

  [[menu.footer]]
    name = "Institute for Geoinformatics"
    title = "Institute for Geoinformatics"
    url = "https://www.uni-muenster.de/Geoinformatics/"
    weight = 1
  [[menu.footer]]
    name = "Imprint"
    title = "Imprint"
    url = "https://www.uni-muenster.de/Rektorat/imprint.html"
    weight = 2

[privacy]
  [privacy.googleAnalytics]
    disable = true
    anonymizeIP = true
    respectDoNotTrack = true
